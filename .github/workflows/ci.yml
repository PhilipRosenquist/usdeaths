name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})
    # if: github.event_name == 'pull_request' || github.repository == 'byuirpytooling/usdeaths'

    strategy:
      fail-fast: false
      matrix:
        config:
          # R devel is important for CRAN submissions, but we aren't there yet and its slow. Let's not run for now...
          # - { os: ubuntu-latest, r: "devel" }
          - { os: ubuntu-latest, r: "release" }
          - { os: ubuntu-latest, r: "oldrel" }
          - { os: windows-latest, r: "release" }
          - { os: macos-latest, r: "release" }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Set up pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::testthat, any::covr
          needs: check

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          error-on: '"error"'

      - name: Check documentation is up to date
        run: |
          devtools::document()
        shell: Rscript {0}
      - name: Fail if documentation is out of sync
        run: |
          git diff --exit-code man/ NAMESPACE
        shell: bash

      - name: Run tests
        run: |
          testthat::test_local()
        shell: Rscript {0}

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results-${{ matrix.config.os }}-R${{ matrix.config.r }}
          path: check
